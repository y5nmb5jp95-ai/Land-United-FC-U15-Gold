<div id="login-screen">

    </div>

      </button>

    <div class="view" id="view-rules"><div id="rules-content"></div></div>

<script>
const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_ANON)
let currentSession=null,currentProfile=null,activeChallenge=null,playerYouTubeId=null,dailyYouTubeId=null,coachYouTubeId=null,playerLookup={},dailyDemoUrl=null,dailyTitle='Daily Challenge',dailyDescription='Complete today\'s session and submit your YouTube link.',dailyConfig={wallPass:false,youtubeUrl:'',freeform:''}

document.getElementById('login-crest-img').src=CREST_URL
document.getElementById('header-crest-img').src=CREST_URL
sb.auth.getSession().then(({data})=>{ if(data.session) bootApp(data.session) })
sb.auth.onAuthStateChange((_e,session)=>{ if(session&&!currentSession) bootApp(session); else if(!session) showLogin() })
document.getElementById('login-pin').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin() })
document.getElementById('login-user').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('login-pin').focus() })

async function bootApp(session) {
  currentSession=session
  const {data:profile}=await sb.from('profiles').select('*').eq('id',session.user.id).single()
  currentProfile=profile
  document.getElementById('login-screen').style.display='none'
  document.getElementById('app').style.display='flex'
  document.getElementById('user-label').textContent=(profile?.display_name||'Player')+' · sign out'
  document.getElementById('week-badge').textContent=getWeekLabel()
  const isViewer=profile?.is_viewer
  const isCoach=profile?.is_coach
  const isAlumni=profile?.is_alumni
  // Viewers see Weekly + Leaderboard only — hide Daily and Coach tabs
  if(isViewer){
    document.getElementById('tab-daily-btn').style.display='none'
    document.getElementById('tab-coach-btn').style.display='none'
    document.getElementById('user-label').textContent='Viewer · sign out'
    loadViewerChallenge()
  } else {
    if(isCoach) document.getElementById('tab-coach-btn').style.display=''
    if(isAlumni) document.getElementById('user-label').textContent=(profile?.display_name||'Alumni')+' (Alumni) · sign out'
    loadDailyDemoUrl()
    loadChallenge()
  }
}
function showLogin(){currentSession=null;currentProfile=null;document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none';}
async function doLogin(){
  const user=document.getElementById('login-user').value.trim().toLowerCase()
  const pin=document.getElementById('login-pin').value.trim()
  const err=document.getElementById('login-err'),btn=document.getElementById('login-btn')
  if(!user||pin.length<4){showErr(err,'Enter your username and 4-digit PIN.');return}

  document.getElementById('view-'+name).classList.add('active')

function extractYouTubeId(url){
  if(!url) return null; url=url.trim()
  let m=url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/); if(m) return m[1]
  m=url.match(/[?&]v=([a-zA-Z0-9_-]{11})/); if(m) return m[1]
  m=url.match(/shorts\/([a-zA-Z0-9_-]{11})/); if(m) return m[1]
  if(/^[a-zA-Z0-9_-]{11}$/.test(url)) return url
  return null
}
function ytEmbed(id){return 'https://www.youtube-nocookie.com/embed/'+id+'?rel=0&modestbranding=1'}

function calcWeeksElapsed(challenge){
  const cws=new Date(challenge.created_at)
  const cday=cws.getDay()
  cws.setDate(cws.getDate()-cday) // go back to Sunday of that week
  cws.setHours(0,0,0,0)
  return Math.round((getWeekStart()-cws)/(7*24*60*60*1000))
}
function calcDecayedPoints(challenge){
  const weeks=calcWeeksElapsed(challenge)
  const base=challenge.flat_points||50
  return weeks===0?base:Math.max(1,Math.round(base/Math.pow(2,weeks)))
}

  sun.setHours(0,0,0,0)
  return sun

function renderDailyArea(sub,weeklyCount){
  if(!sub&&weeklyCount>=STREAK_DAYS) return '<div class="status-box approved"><div class="flex-1"><div style="font-weight:500;font-size:14px;color:var(--green)">&#127942; Week complete! You\'ve hit 5 sessions this week.</div><div style="font-size:12px;color:var(--muted);margin-top:3px">Come back next Monday for a fresh week!</div></div></div>'
  if(!sub) return '<div style="margin-bottom:4px;font-size:13px;font-weight:500">Submit today\'s YouTube link</div><p style="font-size:12px;color:var(--muted);margin-bottom:10px">Upload today\'s session to YouTube (can be unlisted), then paste the link below.</p><div class="yt-input-wrap"><span class="yt-icon">&#9654;&#65039;</span><input id="daily-yt-input" type="url" placeholder="https://youtube.com/watch?v=..." oninput="handleDailyYTInput(this.value)" /></div><div id="daily-yt-feedback"></div><div id="daily-yt-preview" style="display:none"><div class="yt-wrap" style="margin-bottom:8px"><iframe id="daily-yt-frame" src="" allowfullscreen loading="lazy"></iframe></div></div><button class="btn-primary" id="daily-submit-btn" onclick="submitDaily()" disabled>Submit Today\'s Session</button><div id="daily-submit-error" style="color:var(--danger);font-size:13px;margin-top:8px;display:none"></div>'
  const fmt=new Date(sub.submitted_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})
  const ytId=extractYouTubeId(sub.video_url)
  const ytLink=ytId?'<a class="watch-yt" href="'+sub.video_url+'" target="_blank" rel="noreferrer">Watch on YouTube &#8599;</a>':''
  if(sub.status==='pending') return '<div class="status-box pending"><div class="flex-1"><div style="font-weight:500;font-size:14px">&#9203; Submitted at '+fmt+' — awaiting approval</div><div style="font-size:12px;color:var(--muted);margin-top:3px">+'+DAILY_POINTS+' pts added once approved</div>'+ytLink+'</div></div>'
  if(sub.status==='approved') return '<div class="status-box approved"><div class="flex-1"><div style="font-weight:500;font-size:14px;color:var(--green)">&#10003; Approved! +'+DAILY_POINTS+' pts added</div><div style="font-size:12px;color:var(--muted);margin-top:3px">Come back tomorrow to keep going!</div></div></div>'
  const dailyResubmitBtn='<button id="resubmit-daily-btn" style="margin-top:10px;padding:8px 14px;background:var(--peach);color:var(--navy-dark);font-family:var(--font-d);font-size:16px;letter-spacing:1px;border:none;border-radius:var(--radius-sm);cursor:pointer">Resubmit Today</button>'
  const dailyHtml='<div class="status-box rejected"><div class="flex-1"><div style="font-weight:500;font-size:14px;color:var(--danger)">&#10007; Not approved today</div>'+(sub.rejection_reason?'<div style="font-size:12px;color:var(--muted);margin-top:3px">Coach note: '+esc(sub.rejection_reason)+'</div>':'')+'<div style="font-size:12px;color:var(--muted);margin-top:5px">Fix the issue and resubmit today.</div>'+dailyResubmitBtn+'</div></div>'
  const capturedId=sub.id
  setTimeout(()=>{
    const btn=document.getElementById('resubmit-daily-btn')
    if(btn) btn.addEventListener('click', ()=>resubmitDaily(capturedId))
  },0)
  return dailyHtml
}
function handleDailyYTInput(val){
  const id=extractYouTubeId(val)
  const fb=document.getElementById('daily-yt-feedback'),preview=document.getElementById('daily-yt-preview'),frame=document.getElementById('daily-yt-frame'),btn=document.getElementById('daily-submit-btn')
  if(!val.trim()){fb.innerHTML='';preview.style.display='none';btn.disabled=true;dailyYouTubeId=null;return}
  if(id){dailyYouTubeId=id;fb.innerHTML='<div class="yt-valid">&#10003; Link recognised</div>';frame.src=ytEmbed(id);preview.style.display='block';btn.disabled=false}
  else{dailyYouTubeId=null;fb.innerHTML='<div class="yt-invalid">Not a valid YouTube link.</div>';preview.style.display='none';btn.disabled=true}
}
async function submitDaily(){
  if(!dailyYouTubeId) return
  const btn=document.getElementById('daily-submit-btn'),errEl=document.getElementById('daily-submit-error')
  btn.disabled=true;btn.textContent='Submitting…';errEl.style.display='none'
  try{
    const{data:sub,error}=await sb.from('daily_submissions').insert({player_id:currentSession.user.id,video_url:'https://www.youtube.com/watch?v='+dailyYouTubeId,status:'pending',submitted_at:new Date().toISOString(),submitted_date:(()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')})()}).select().single()
    if(error) throw error
    dailyYouTubeId=null
    document.getElementById('daily-submission-area').innerHTML=renderDailyArea(sub,0)
  }catch(e){
    if(e.code==='23505'){errEl.style.display='block';errEl.textContent='You have already submitted today. Come back tomorrow!'}
    else{errEl.style.display='block';errEl.textContent='Something went wrong. Please try again.'}
    btn.disabled=false;btn.textContent='Submit Today\'s Session';console.error(e)
  }
}

/* LEADERBOARD */
async function loadLeaderboard(){
  const el=document.getElementById('lb-content')
  el.innerHTML='<div class="loading-center"><div class="spinner"></div></div>'
  try{
    const{data:players}=await sb.from('profiles').select('id,display_name,total_points,current_streak,avatar_color').eq('is_coach',false).eq('is_viewer',false).eq('is_alumni',false).order('total_points',{ascending:false})
    const total=players.length,onStreak=players.filter(p=>p.current_streak>0).length,pct=total>0?Math.round(onStreak/total*100):0
    const COLORS=['#3a5bbf','#bf5a3a','#3abf7a','#bf3a7a','#7a3abf','#3a9bbf','#bfaa3a','#bf3a3a','#3abfbf','#7abf3a','#bf7a3a','#3a3abf']
    const rows=players.map((p,i)=>{
      const rc=i===0?'r1':i===1?'r2':i===2?'r3':'',col=p.avatar_color||COLORS[i%COLORS.length]
      const ini=p.display_name.split(' ').map(x=>x[0]).join('').toUpperCase()
      const streak=p.current_streak>0?'<div style="font-size:11px;color:var(--green)">&#128293; '+p.current_streak+' week streak</div>':''
      playerLookup[p.id]={name:p.display_name,color:col}
      return '<div class="lb-row'+(i<3?' gold':'')+'" data-pid="'+p.id+'" onclick="openStats(this)" style="cursor:pointer"><div class="lb-rank '+rc+'">'+(i+1)+'</div><div class="avatar" style="background:'+col+'33;color:'+col+';border:1px solid '+col+'55">'+ini+'</div><div class="flex-1"><div style="font-size:14px;font-weight:500">'+esc(p.display_name)+'</div>'+streak+'</div><div style="display:flex;align-items:center;gap:8px"><div class="lb-pts">'+p.total_points+'</div><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(245,245,242,0.3)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div></div>'

    el.innerHTML='<div class="lb-stats"><div class="stat-card"><div class="stat-num">'+total+'</div><div class="stat-lbl">Players</div></div><div class="stat-card"><div class="stat-num">'+onStreak+'</div><div class="stat-lbl">On a streak</div></div><div class="stat-card"><div class="stat-num">'+pct+'%</div><div class="stat-lbl">Participation</div></div></div>'+(rows||'<p class="text-muted" style="text-align:center;padding-top:20px">No players yet.</p>')
  }catch(e){el.innerHTML='<p class="text-muted">Could not load leaderboard.</p>';console.error(e)}
}

async function loadCoachPanel(){

/* APPROVE / REJECT */
async function checkStreakBonus(playerId){
  // Check if player has completed 5 approved sessions this week (Mon-Sun)
  const weekStart=getWeekStart().toISOString().slice(0,10)
  const{count}=await sb.from('daily_submissions').select('*',{count:'exact',head:true}).eq('player_id',playerId).eq('status','approved').gte('submitted_date',weekStart)
  return (count||0)===STREAK_DAYS // exactly 5 triggers the bonus (not 6,7 etc to avoid double awarding)
}
async function approveSub(subId,type){
  const row=document.getElementById('pr-'+type+'-'+subId)
  const btn=row?row.querySelector('.btn-approve'):null
  if(btn){btn.disabled=true;btn.textContent='Approving...'}
  if(row) row.classList.add('fading')
  try{
    let finalPoints=DAILY_POINTS
    let playerId=null

    if(type==='daily'){
      // Daily submission — just needs player_id, no challenge_id
      const{data:sub,error}=await sb.from('daily_submissions').select('player_id').eq('id',subId).single()
      if(error) throw error
      playerId=sub.player_id
      await sb.from('daily_submissions').update({status:'approved',points_awarded:finalPoints,reviewed_at:new Date().toISOString()}).eq('id',subId)
    } else {
      // Weekly submission — needs challenge_id for position bonus
      const{data:sub,error}=await sb.from('submissions').select('player_id,challenge_id').eq('id',subId).single()
      if(error) throw error
      playerId=sub.player_id
      const{data:approved}=await sb.from('submissions').select('id').eq('challenge_id',sub.challenge_id).eq('status','approved').order('reviewed_at',{ascending:true})
      const pos=approved?approved.length:0
      const{data:challenge}=await sb.from('challenges').select('flat_points,day1_bonus,day2_bonus,day3_bonus,day4_bonus,created_at').eq('id',sub.challenge_id).single()
      // Calculate weeks elapsed since challenge was created (week 0 = same week)
      const weekMs=7*24*60*60*1000
      const challengeWeekStart=new Date(challenge.created_at)
      const day=challengeWeekStart.getDay()
      challengeWeekStart.setDate(challengeWeekStart.getDate()-day) // Sunday-based
      challengeWeekStart.setHours(0,0,0,0)
      const submissionWeekStart=getWeekStart()
      const weeksElapsed=Math.round((submissionWeekStart-challengeWeekStart)/weekMs)
      if(weeksElapsed===0){
        // First week — full points + position bonus
        finalPoints=(challenge?.flat_points||50)+positionBonus(pos,challenge)
      } else {
        // Subsequent weeks — halved each week, no position bonus
        const base=challenge?.flat_points||50
        finalPoints=Math.max(1,Math.round(base/Math.pow(2,weeksElapsed)))
      }
      await sb.from('submissions').update({status:'approved',points_awarded:finalPoints,reviewed_at:new Date().toISOString()}).eq('id',subId)
    }

    // Add points (skip for alumni)
    const{data:playerProfile}=await sb.from('profiles').select('is_alumni').eq('id',playerId).single()
    if(!playerProfile?.is_alumni){
      await sb.rpc('add_points',{player_id:playerId,amount:finalPoints})
    }

    // Check streak bonus for daily
    if(type==='daily'){
      const hasStreak=await checkStreakBonus(playerId)
      if(hasStreak){
        await sb.rpc('add_points',{player_id:playerId,amount:STREAK_BONUS})
        const t=document.getElementById('streak-toast')
        if(t){t.style.display='flex';setTimeout(()=>t.style.display='none',4000)}
      }
    }
    setTimeout(()=>{ if(row) row.remove() },350)
  }catch(e){
    if(row){row.classList.remove('fading');if(btn){btn.disabled=false;btn.textContent='✓ Approve'}}
    console.error('approveSub error:',e)
    alert('Approval failed: '+e.message)
  }
}
function showRejectForm(subId,type){
  document.getElementById('actions-'+type+'-'+subId).innerHTML='<div class="reject-form"><input id="reason-'+subId+'" placeholder="Reason for rejection (optional)" /><div class="reject-actions"><button class="btn-reject" onclick="confirmReject(&quot;'+subId+'&quot;,&quot;'+type+'&quot;)">Confirm reject</button><button class="cancel-link" onclick="cancelReject(&quot;'+subId+'&quot;,&quot;'+type+'&quot;)">Cancel</button></div></div>'

function cancelReject(subId,type){
  const actEl=document.getElementById('actions-'+type+'-'+subId)
  const pts=actEl?parseInt(actEl.dataset.pts)||DAILY_POINTS:DAILY_POINTS
  actEl.innerHTML='<button class="btn-approve" onclick="approveSub(&quot;'+subId+'&quot;,&quot;'+type+'&quot;)">&#10003; Approve</button><button class="btn-reject" onclick="showRejectForm(&quot;'+subId+'&quot;,&quot;'+type+'&quot;)">&#10007; Reject</button>'

async function confirmReject(subId,type){
  const reason=document.getElementById('reason-'+subId)?.value||''
  const row=document.getElementById('pr-'+type+'-'+subId)
  if(row) row.classList.add('fading')
  try{
    const table=type==='daily'?'daily_submissions':'submissions'
    await sb.from(table).update({status:'rejected',rejection_reason:reason,reviewed_at:new Date().toISOString()}).eq('id',subId)
    setTimeout(()=>{ if(row) row.remove() },350)
  }catch(e){ if(row) row.classList.remove('fading'); console.error(e) }
}

/* POST CHALLENGE */
function getNextSundayNineAM(){
  const now=new Date(),day=now.getDay()
  const hour=now.getHours(),min=now.getMinutes()
  const isPastNineAM=hour>9||(hour===9&&min>0)
  const daysUntil=day===0&&!isPastNineAM?0:(7-day)%7||7
  const s=new Date(now); s.setDate(now.getDate()+daysUntil); s.setHours(9,0,0,0); return s.toISOString()
}
async function postChallenge(schedule){
  const title=document.getElementById('c-title').value.trim(),desc=document.getElementById('c-desc').value.trim()
  const flat=parseInt(document.getElementById('c-flat').value)||50,d1=parseInt(document.getElementById('c-d1').value)||20,d2=parseInt(document.getElementById('c-d2').value)||15,d3=parseInt(document.getElementById('c-d3').value)||10,d4=parseInt(document.getElementById('c-d4')?.value)||5
  const errEl=document.getElementById('post-error')
  if(!title||!desc){errEl.style.display='block';errEl.textContent='Fill in the title and description.';return}
  const postBtn=document.getElementById('post-btn'),schedBtn=document.getElementById('schedule-btn')
  postBtn.disabled=true;schedBtn.disabled=true;errEl.style.display='none'
  if(schedule){schedBtn.textContent='Scheduling…'}else{postBtn.textContent='Publishing…'}
  try{
    const demoUrl=coachYouTubeId?'https://www.youtube.com/watch?v='+coachYouTubeId:null
    if(schedule){
      const{error:cErr}=await sb.from('challenges').insert({title,description:desc,demo_video_url:demoUrl,flat_points:flat,day1_bonus:d1,day2_bonus:d2,day3_bonus:d3,day4_bonus:d4,is_active:false,scheduled_for:getNextSundayNineAM()})
      if(cErr) throw cErr; showToast('schedule-toast')
    }else{
      // Insert new challenge first, THEN deactivate old one — prevents blank state if insert fails
      const{data:c,error:cErr}=await sb.from('challenges').insert({title,description:desc,demo_video_url:demoUrl,flat_points:flat,day1_bonus:d1,day2_bonus:d2,day3_bonus:d3,day4_bonus:d4,is_active:true,scheduled_for:null}).select().single()
      if(cErr) throw cErr
      // Now safely deactivate any other active challenges
      await sb.from('challenges').update({is_active:false}).eq('is_active',true).neq('id',c.id)
      activeChallenge=c; showToast('post-toast')
    }
    document.getElementById('c-title').value='';document.getElementById('c-desc').value='';clearCoachYT()
    postBtn.disabled=false;schedBtn.disabled=false;postBtn.textContent='🚀 Publish Now';schedBtn.textContent='📅 Schedule Sunday 9am'
  }catch(e){errEl.style.display='block';errEl.textContent='Something went wrong. Try again.';postBtn.disabled=false;schedBtn.disabled=false;postBtn.textContent='🚀 Publish Now';schedBtn.textContent='📅 Schedule Sunday 9am';console.error(e)}
}

/* COUNTDOWN */
let countdownInterval=null
function startCountdown(){
  if(countdownInterval) clearInterval(countdownInterval)
  function tick(){
    const wrap=document.getElementById('countdown-wrap')
    if(!wrap){clearInterval(countdownInterval);return}
    const now=new Date()
    const day=now.getDay() // 0=Sun
    const hour=now.getHours()
    const min=now.getMinutes()
    // Next Sunday 9am LOCAL time
    const target=new Date(now)
    const isPastNineAM=hour>9||(hour===9&&min>0)
    const daysUntil=day===0&&!isPastNineAM?0:(7-day)%7||7
    target.setDate(now.getDate()+daysUntil)
    target.setHours(9,0,0,0)
    const diff=target-now
    if(diff<=0){document.getElementById('cd-d').textContent='0';document.getElementById('cd-h').textContent='00';document.getElementById('cd-m').textContent='00';document.getElementById('cd-s').textContent='00';return}
    const d=Math.floor(diff/86400000)
    const h=Math.floor((diff%86400000)/3600000)
    const m=Math.floor((diff%3600000)/60000)
    const s=Math.floor((diff%60000)/1000)
    const pad=n=>String(n).padStart(2,'0')
    document.getElementById('cd-d').textContent=d
    document.getElementById('cd-h').textContent=pad(h)
    document.getElementById('cd-m').textContent=pad(m)
    document.getElementById('cd-s').textContent=pad(s)
  }
  tick()
  countdownInterval=setInterval(tick,1000)
}

/* DAILY DEMO VIDEO */
function handleDailyDemoInput(val){
  const id=extractYouTubeId(val)
  const fb=document.getElementById('daily-demo-feedback')
  const preview=document.getElementById('daily-demo-preview')
  const frame=document.getElementById('daily-demo-frame')
  if(!val.trim()){fb.innerHTML='';preview.style.display='none';return}
  if(id){
    fb.innerHTML='<div class="yt-valid" style="margin-top:5px">&#10003; Link recognised</div>'
    frame.src=ytEmbed(id); preview.style.display='block'
  } else {
    fb.innerHTML='<div class="yt-invalid" style="margin-top:5px">Not a valid YouTube link.</div>'
    preview.style.display='none'
  }
}
async function saveDailyDemo(){
  const val=document.getElementById('daily-demo-input').value.trim()
  const id=extractYouTubeId(val)
  if(!id){ alert('Please enter a valid YouTube link first.'); return }
  const url='https://www.youtube.com/watch?v='+id
  try{
    await sb.from('settings').upsert({key:'daily_demo_url',value:url})
    dailyDemoUrl=url
    showToast('daily-demo-toast')
  }catch(e){ alert('Could not save. Try again.'); console.error(e) }
}

/* CUSTOM DAILY CHALLENGE (U15) */
function handleDCYouTubeInput(val){
  const id=extractYouTubeId(val)
  const fb=document.getElementById('dc-yt-feedback')
  const preview=document.getElementById('dc-yt-preview')
  const frameWrap=document.getElementById('dc-yt-frame-wrap')
  const frame=document.getElementById('dc-yt-frame')
  const cb=document.getElementById('dc-youtube')
  if(!val.trim()){fb.innerHTML='';if(preview)preview.style.display='none';return}
  if(id){
    fb.innerHTML='<div class="yt-valid" style="margin-top:5px">&#10003; Link recognised</div>'
    if(frame) frame.src=ytEmbed(id)
    if(frameWrap) frameWrap.style.display='block'
    if(preview) preview.style.display='block'
    if(cb) cb.checked=true
  } else {
    fb.innerHTML='<div class="yt-invalid" style="margin-top:5px">Not a valid YouTube link.</div>'
  }
}

async function saveDailyConfig(){
  const wallPass=document.getElementById('dc-wallpass')?.checked||false
  const youtubeChecked=document.getElementById('dc-youtube')?.checked||false
  const youtubeUrl=document.getElementById('dc-youtube-url')?.value.trim()||''
  const freeformChecked=document.getElementById('dc-freeform')?.checked||false
  const freeformText=document.getElementById('dc-freeform-text')?.value.trim()||''
  const errEl=document.getElementById('daily-config-error')

  if(!wallPass&&!youtubeChecked&&!freeformChecked){
    if(errEl){errEl.style.display='block';errEl.textContent='Please select at least one challenge option.'}
    return
  }
  if(youtubeChecked&&!extractYouTubeId(youtubeUrl)){
    if(errEl){errEl.style.display='block';errEl.textContent='Please enter a valid YouTube link for the YouTube challenge.'}
    return
  }
  if(freeformChecked&&!freeformText){
    if(errEl){errEl.style.display='block';errEl.textContent='Please enter a description for the custom challenge.'}
    return
  }

  const config={
    wallPass,
    youtubeUrl:youtubeChecked?youtubeUrl:'',
    freeform:freeformChecked?freeformText:''
  }
  try{
    await sb.from('settings').upsert({key:'daily_config',value:JSON.stringify(config)})
    dailyConfig=config
    showToast('daily-config-toast')
    if(errEl) errEl.style.display='none'
  }catch(e){
    if(errEl){errEl.style.display='block';errEl.textContent='Could not save. Try again.'}
    console.error(e)
  }
}

/* DAILY TOGGLE */
async function loadDailyToggleState(){
  try{
    const{data}=await sb.from('settings').select('value').eq('key','daily_enabled').maybeSingle()
    const enabled=!data||data.value!=='false'
    updateToggleUI(enabled)
  }catch(e){console.error(e)}
}
function updateToggleUI(enabled){
  const toggle=document.getElementById('daily-toggle')
  const thumb=document.getElementById('daily-toggle-thumb')
  const label=document.getElementById('daily-toggle-label')
  if(!toggle) return
  toggle.style.background=enabled?'var(--green)':'var(--card-border)'
  thumb.style.left=enabled?'22px':'2px'
  label.textContent=enabled?'On':'Off'
  label.style.color=enabled?'var(--green)':'var(--muted)'
}
async function toggleDaily(){
  const label=document.getElementById('daily-toggle-label')
  if(!label) return
  const currentlyOn=label.textContent==='On'
  const newVal=currentlyOn?'false':'true'
  try{
    await sb.from('settings').upsert({key:'daily_enabled',value:newVal})
    updateToggleUI(!currentlyOn)
    showToast('daily-toggle-toast')
  }catch(e){console.error(e);alert('Could not update. Try again.')}
}

/* RESET */
async function resetAllData(){
  const input=document.getElementById('reset-confirm-input')
  const errEl=document.getElementById('reset-error')
  if(!input||input.value.trim()!=='RESET'){
    errEl.style.display='block'
    errEl.textContent='You must type RESET exactly to confirm.'
    return
  }
  const btn=event.target
  btn.disabled=true; btn.textContent='Resetting…'; errEl.style.display='none'
  try{
    // Delete all submissions
    await sb.from('submissions').delete().neq('id','00000000-0000-0000-0000-000000000000')
    // Delete all daily submissions
    await sb.from('daily_submissions').delete().neq('id','00000000-0000-0000-0000-000000000000')
    // Delete all challenges
    await sb.from('challenges').delete().neq('id','00000000-0000-0000-0000-000000000000')
    // Reset all player points and streaks
    await sb.from('profiles').update({total_points:0,current_streak:0}).eq('is_coach',false).eq('is_viewer',false).eq('is_alumni',false)
    input.value=''
    btn.disabled=false; btn.textContent='🗑️ Reset Everything'
    showToast('reset-toast')
  }catch(e){
    errEl.style.display='block'
    errEl.textContent='Something went wrong: '+e.message
    btn.disabled=false; btn.textContent='🗑️ Reset Everything'
    console.error(e)
  }
}

/* RESUBMIT WEEKLY & DAILY */
function resubmitWeekly(){
  // Delete the rejected submission then reload the challenge tab fresh
  if(!activeChallenge||!currentSession) return
  sb.from('submissions').delete().eq('challenge_id',activeChallenge.id).eq('player_id',currentSession.user.id).then(({error})=>{
    if(error){ console.error(error); alert('Could not resubmit. Try again.'); return }
    loadChallenge()
  })
}

async function resubmitDaily(subId){
  const{error}=await sb.from('daily_submissions').delete().eq('id',subId)
  if(error){ console.error(error); alert('Could not resubmit. Try again.'); return }
  loadDaily()
}

/* HELPERS */
async function calcBonus(challengeId,submissionId){
  // Count how many approved submissions exist for this challenge before this one
  const{data}=await sb.from('submissions').select('id').eq('challenge_id',challengeId).eq('status','approved').order('reviewed_at',{ascending:true})
  if(!data) return 0
  const pos=data.findIndex(s=>s.id===submissionId)
  return pos===-1?0:pos // position among approved (0=1st, 1=2nd, etc.) mapped to bonus below
}
function positionBonus(pos,c){
  if(pos===0) return c?.day1_bonus||20
  if(pos===1) return c?.day2_bonus||15
  if(pos===2) return c?.day3_bonus||10
  if(pos===3) return c?.day4_bonus||5
  return 0
}
function getWeekLabel(){
  const now=new Date()
  const day=now.getDay() // 0=Sun
  const sun=new Date(now)
  sun.setDate(now.getDate()-day) // go back to Sunday
  const sat=new Date(sun)
  sat.setDate(sun.getDate()+6)
  const fmt=d=>d.toLocaleDateString('en-US',{month:'numeric',day:'numeric'})
  return fmt(sun)+' – '+fmt(sat)
}
function esc(str){if(!str) return '';return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function showErr(el,msg){el.style.display='block';el.textContent=msg}
function showToast(id){const t=document.getElementById(id);if(t){t.style.display='flex';setTimeout(()=>t.style.display='none',3500)}}

    })
